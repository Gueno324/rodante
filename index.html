<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>rodante | Archivo Visual</title>
    
    <link rel="icon" type="image/png" href="logo%20inclinado%20negro.png?v=3">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=Libre+Baskerville:ital@1&display=swap');
        
        :root { --bg: #030303; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- CABECERA --- */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 45px 30px;
            text-align: center;
            z-index: 1000;
            background: linear-gradient(to bottom, var(--bg) 60%, transparent);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 32px; 
            height: 32px;
            filter: invert(1); 
            opacity: 0.9;
            pointer-events: auto;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        .header-icon:hover { opacity: 0.6; }

        .logo {
            font-weight: 100;
            letter-spacing: 1.2em;
            text-transform: lowercase;
            font-size: 1.1rem;
            pointer-events: auto;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-right: -1.2em; 
        }
        .logo:hover { opacity: 0.6; }

        /* --- CONTENIDO PRINCIPAL --- */
        main { flex: 1; }

        .main-gallery {
            display: flex;
            flex-direction: column;
            gap: 1vh;
            padding: 1vh;
            margin-top: 140px; 
            transition: opacity 0.5s ease;
        }

        .row { display: flex; gap: 1vh; height: 45vh; }

        .photo-item {
            position: relative;
            flex: 1;
            overflow: hidden;
            cursor: pointer;
            background: #0a0a0a;
            transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (min-width: 1024px) { .photo-item:hover { flex: 2; } }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: transform 1.2s ease, opacity 0.6s ease;
        }

        .photo-item:hover img { opacity: 1; transform: scale(1.05); }

        .label {
            position: absolute;
            bottom: 25px;
            left: 25px;
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: lowercase;
            padding: 6px 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-left: 1px solid rgba(255,255,255,0.3);
        }

        /* --- VISTA DE CARPETA --- */
        #folder-view {
            display: none;
            padding: 200px 20px 40px;
            min-height: 100vh;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .grid-item { aspect-ratio: 16/9; overflow: hidden; cursor: pointer; background: #0d0d0d; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease, opacity 0.4s ease; opacity: 0.7; }
        .grid-item:hover img { transform: scale(1.08); opacity: 1; }

        .back-btn {
            display: block; margin: 0 auto 50px; font-size: 10px; letter-spacing: 0.4em;
            text-transform: lowercase; color: rgba(255,255,255,0.4); cursor: pointer; text-align: center; width: fit-content;
        }
        .back-btn:hover { color: white; }

        /* --- VISOR FULLSCREEN --- */
        #viewer {
            display: none; position: fixed; inset: 0; background: black; z-index: 2000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #viewer img { max-width: 100vw; max-height: 100vh; object-fit: contain; }
        .viewer-controls { position: fixed; top: 40px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; z-index: 2100; pointer-events: none; }
        .viewer-btn { font-size: 10px; letter-spacing: 0.3em; text-transform: lowercase; cursor: pointer; color: rgba(255,255,255,0.5); pointer-events: auto; }
        .viewer-btn:hover { color: white; }

        .nav-btn { position: absolute; top: 0; bottom: 0; width: 15%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2050; opacity: 0; transition: opacity 0.3s; font-size: 40px; }
        .nav-btn:hover { opacity: 1; background: linear-gradient(to var(--dir), rgba(0,0,0,0.5), transparent); }
        .prev-btn { left: 0; --dir: right; }
        .next-btn { right: 0; --dir: left; }

        /* --- PIE DE PÁGINA --- */
        .footer { padding: 80px 20px; text-align: center; font-weight: 200; text-transform: lowercase; color: rgba(255,255,255,0.25); border-top: 1px solid rgba(255,255,255,0.03); }
        .footer a { color: #3b82f6; text-decoration: none; }

        @media (max-width: 768px) {
            .row { flex-direction: column; height: auto; }
            .photo-item { height: 45vh; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo%20inclinado%20negro.png" class="header-icon" alt="Logo" onclick="showHome()">
        <div class="logo" onclick="showHome()">rodante</div>
    </header>

    <main>
        <section id="home-page" class="main-gallery">
            <div class="row" style="height: 60vh;">
                <div class="photo-item" onclick="openFolder('panoramicas')">
                    <img src="https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg" alt="Panorámicas">
                    <div class="label">panorámicas</div>
                </div>
            </div>
            
            <div class="row">
                <div class="photo-item" onclick="openFolder('retratos')">
                    <img src="https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg" alt="Retratos">
                    <div class="label">retratos</div>
                </div>
                <div class="photo-item" onclick="openFolder('macros')">
                    <img src="https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg" alt="Macros">
                    <div class="label">macros</div>
                </div>
            </div>
        </section>

        <section id="folder-view">
            <div class="back-btn" onclick="showHome()">← volver al inicio</div>
            <div id="grid-container" class="grid-container"></div>
        </section>
    </main>

    <footer class="footer">
        <div style="font-size: 9px; letter-spacing: 0.4em;">© 2026 rodante · archivo visual por <a href="https://rodante.es" target="_blank">rodante</a></div>
    </footer>

    <div id="viewer">
        <div class="viewer-controls">
            <div class="viewer-btn" onclick="showHome()">inicio</div>
            <div class="viewer-btn" onclick="closeViewer()">cerrar</div>
        </div>
        <div class="nav-btn prev-btn" onclick="changePhoto(-1)">‹</div>
        <div class="nav-btn next-btn" onclick="changePhoto(1)">›</div>
        <img id="viewer-img" src="">
    </div>

    <script>
        const GALLERIES = {
            panoramicas: [
                "https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg",
                "https://live.staticflickr.com/65535/48927874868_a2a4a12457_b.jpg",
                "https://live.staticflickr.com/65535/48807744627_9cdb17a0e9_b.jpg",
                "https://live.staticflickr.com/5516/11324887693_50c01627dc_b.jpg",
                "https://live.staticflickr.com/65535/53352155968_fabb2f983c_b.jpg",
                "https://live.staticflickr.com/4854/31932303167_c8edaa4ea0_b.jpg",
                "https://live.staticflickr.com/7823/32998262948_9239dd45d6_b.jpg",
                "https://live.staticflickr.com/4907/32998262538_d0cdcd33c6_b.jpg",
                "https://live.staticflickr.com/4866/32998261958_31f81d651b_b.jpg",
                "https://live.staticflickr.com/8877/17570982642_b74be2ab95_b.jpg",
                "https://live.staticflickr.com/5316/14172388132_5c5b33d4d5_b.jpg",
                "https://live.staticflickr.com/8246/8479454738_c03df0a782_b.jpg",
                "https://live.staticflickr.com/8399/8606677981_7940ae5062_b.jpg",
                "https://live.staticflickr.com/4046/4472556919_b485a2706e_b.jpg"
            ],
            retratos: [
                "https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg",
                "https://live.staticflickr.com/65535/55143210951_f624e6131a_b.jpg"
            ],
            macros: [
                "https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg",
                "https://live.staticflickr.com/2382/2420606177_066aca122c_b.jpg"
            ]
        };

        let currentActiveGallery = [];
        let currentIndex = 0;

        function showHome() {
            document.getElementById('home-page').style.display = 'flex';
            document.getElementById('folder-view').style.display = 'none';
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function openFolder(id) {
            currentActiveGallery = GALLERIES[id];
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            currentActiveGallery.forEach((url, idx) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.onclick = () => openViewer(idx);
                item.innerHTML = `<img src="${url}" loading="lazy">`;
                container.appendChild(item);
            });
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function openViewer(index) {
            currentIndex = index;
            updateViewerImage();
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            if (document.getElementById('folder-view').style.display === 'block') document.body.style.overflow = 'auto';
        }

        function updateViewerImage() {
            const img = document.getElementById('viewer-img');
            img.src = currentActiveGallery[currentIndex];
        }

        function changePhoto(step) {
            currentIndex = (currentIndex + step + currentActiveGallery.length) % currentActiveGallery.length;
            updateViewerImage();
        }
    </script>
</body>
</html>
