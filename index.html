<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>rodante | Archivo Visual</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="logo%20inclinado%20negro.png?v=15">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        
        :root { --bg: #030303; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- ESTRUCTURA FIJA (NO TOCAR) --- */
        .fixed-layer {
            position: fixed;
            left: 0;
            width: 100%;
            z-index: 1000;
            pointer-events: none;
            opacity: 1; 
        }

        .header {
            top: 0;
            padding: 40px 30px;
            background: linear-gradient(to bottom, var(--bg) 60%, transparent);
        }

        .footer {
            bottom: 0;
            padding: 20px 30px;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
        }

        .layer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
        }

        .header-icon {
            width: 26px; 
            height: 26px;
            filter: invert(1); 
            opacity: 0.5;
            cursor: pointer;
            transition: opacity 0.5s;
        }
        .header-icon:hover { opacity: 1; }

        .logo-text {
            font-weight: 100;
            letter-spacing: 1.2em;
            text-transform: lowercase;
            font-size: 0.8rem;
            cursor: pointer;
            margin-right: -1.2em;
            opacity: 0.6;
        }

        .footer-text {
            font-size: 9px;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            line-height: 1.6;
        }

        .credit-text {
            display: block;
            font-size: 7.5px;
            opacity: 0.6;
            margin-top: 2px;
            text-transform: lowercase;
            letter-spacing: 0.1em;
        }

        .blue-link {
            color: #3b82f6; 
            text-decoration: none;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .blue-link:hover { opacity: 1; text-decoration: underline; }

        /* --- GALERÍA PRINCIPAL --- */
        main { padding-bottom: 150px; }

        .main-gallery {
            padding: 160px 15px 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(20vh, auto);
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: #050505;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transition: transform 4s cubic-bezier(0.19, 1, 0.22, 1), opacity 1.2s ease;
        }

        .photo-item:hover img { opacity: 0.85; transform: scale(1.02); }

        /* Layout de categorías */
        .cat-xl { grid-column: span 2; height: 40vh; }
        .cat-lg { grid-column: span 1; height: 35vh; }
        .cat-md { grid-column: span 1; height: 25vh; }

        .label {
            position: absolute;
            bottom: 25px;
            left: 25px;
            font-size: 9px;
            font-weight: 200;
            letter-spacing: 0.5em;
            text-transform: lowercase;
            padding: 6px 14px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(5px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- VISTA DE CARPETA --- */
        #folder-view {
            display: none;
            padding: 160px 20px 180px;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .masonry-container {
            columns: 3 300px;
            column-gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 15px;
            background: #080808;
            cursor: pointer;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            opacity: 0.75;
            transition: opacity 0.8s ease;
        }

        .back-btn {
            font-size: 8px; 
            letter-spacing: 0.5em;
            text-transform: lowercase; 
            color: rgba(255,255,255,0.4); 
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }

        /* --- VISOR --- */
        #viewer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.99); z-index: 2000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(15px);
        }
        #viewer img { max-width: 90vw; max-height: 85vh; object-fit: contain; }
        .viewer-close { position: absolute; top: 30px; right: 30px; font-size: 9px; letter-spacing: 0.4em; cursor: pointer; opacity: 0.4; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); padding: 40px; cursor: pointer; font-size: 30px; font-weight: 100; opacity: 0; transition: opacity 0.3s; color: white; }
        #viewer:hover .nav-btn { opacity: 0.2; }
        .nav-btn:hover { opacity: 0.9 !important; }

        @media (max-width: 768px) {
            .main-gallery { grid-template-columns: 1fr; }
            .cat-xl, .cat-lg, .cat-md { grid-column: span 1; height: 30vh; }
            .masonry-container { columns: 2; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header id="main-header" class="fixed-layer header">
        <div class="layer-content">
            <img src="logo%20inclinado%20negro.png" class="header-icon" alt="Logo rodante" onclick="showHome()">
            <div class="logo-text" onclick="showHome()">rodante</div>
        </div>
    </header>

    <main>
        <section id="home-page" class="main-gallery">
            <!-- Panorámicas -->
            <div class="photo-item cat-xl" onclick="openFolder('panoramicas')">
                <img src="https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg" alt="Panorámicas" draggable="false">
                <div class="label">panorámicas</div>
            </div>
            
            <!-- Retratos -->
            <div class="photo-item cat-lg" onclick="openFolder('retratos')">
                <img src="https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg" alt="Retratos" draggable="false">
                <div class="label">retratos</div>
            </div>

            <!-- Nocturnas -->
            <div class="photo-item cat-lg" onclick="openFolder('nocturnas')">
                <img src="https://live.staticflickr.com/7244/7310126402_b01371ba26_b.jpg" alt="Nocturnas" draggable="false">
                <div class="label">nocturnas</div>
            </div>

            <!-- Mini Hollywood -->
            <div class="photo-item cat-xl" onclick="openFolder('hollywood')">
                <img src="https://live.staticflickr.com/1073/5120019577_a5f1a90897_b.jpg" alt="Mini Hollywood" draggable="false">
                <div class="label">mini hollywood</div>
            </div>

            <!-- Deportes -->
            <div class="photo-item cat-lg" onclick="openFolder('deportes')">
                <img src="https://live.staticflickr.com/65535/52703815338_eedfa7a171_b.jpg" alt="Deportes" draggable="false">
                <div class="label">deportes</div>
            </div>

            <!-- Blanco y Negro -->
            <div class="photo-item cat-lg" onclick="openFolder('bn')">
                <img src="https://images.unsplash.com/photo-1470124114660-23b044d0ecfb?q=80&w=2070&auto=format&fit=crop" alt="Blanco y Negro" draggable="false">
                <div class="label">blanco y negro</div>
            </div>

            <!-- Naturaleza (ACTUALIZADA) -->
            <div class="photo-item cat-md" onclick="openFolder('naturaleza')">
                <img src="https://live.staticflickr.com/2326/2345296962_a97217acb6_b.jpg" alt="Naturaleza" draggable="false">
                <div class="label">naturaleza</div>
            </div>

            <!-- Macros -->
            <div class="photo-item cat-md" onclick="openFolder('macros')">
                <img src="https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg" alt="Macros" draggable="false">
                <div class="label">macros</div>
            </div>
        </section>

        <section id="folder-view">
            <div class="layer-content" style="align-items: flex-start; max-width: 1400px; margin: 0 auto;">
                <div class="back-btn" onclick="showHome()">[ volver al inicio ]</div>
            </div>
            <div id="masonry-container" class="masonry-container"></div>
        </section>
    </main>

    <footer id="main-footer" class="fixed-layer footer">
        <div class="layer-content">
            <div class="footer-text">
                © <span id="year"></span> rodante — todos los derechos reservados
                <span class="credit-text">
                    creación y diseño de <span class="blue-link" onclick="showHome()">rodante</span>
                </span>
            </div>
        </div>
    </footer>

    <div id="viewer" onclick="closeViewer()">
        <div class="viewer-close">CERRAR</div>
        <div class="nav-btn" style="left:0" onclick="event.stopPropagation(); changePhoto(-1)">‹</div>
        <div class="nav-btn" style="right:0" onclick="event.stopPropagation(); changePhoto(1)">›</div>
        <img id="viewer-img" src="" draggable="false">
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const GALLERIES = {
            panoramicas: [
                "https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg",
                "https://live.staticflickr.com/65535/48927874868_a2a4a12457_b.jpg",
                "https://live.staticflickr.com/65535/48807744627_9cdb17a0e9_b.jpg",
                "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop"
            ],
            retratos: [
                "https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg",
                "https://live.staticflickr.com/65535/55143210951_f624e6131a_b.jpg",
                "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1964&auto=format&fit=crop"
            ],
            nocturnas: [
                "https://live.staticflickr.com/7244/7310126402_b01371ba26_b.jpg",
                "https://live.staticflickr.com/65535/49229687873_84d7ce7bdc_b.jpg",
                "https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop"
            ],
            hollywood: [
                "https://live.staticflickr.com/1073/5120019577_a5f1a90897_b.jpg",
                "https://live.staticflickr.com/4146/5083138317_38c26f3603_b.jpg",
                "https://live.staticflickr.com/4154/5064505786_0f364244e5_b.jpg",
                "https://live.staticflickr.com/4088/5058794107_76598e7133_b.jpg",
                "https://live.staticflickr.com/4109/5056125627_4b5b11d2c1_b.jpg",
                "https://live.staticflickr.com/4106/5085327169_994b02dd11_b.jpg"
            ],
            deportes: [
                "https://live.staticflickr.com/65535/52703815338_eedfa7a171_b.jpg",
                "https://live.staticflickr.com/65535/52700555708_4a1971c318_b.jpg",
                "https://live.staticflickr.com/2661/3733671785_81ca8fcfd3_b.jpg",
                "https://live.staticflickr.com/2319/2248361626_665c0f6e4c_b.jpg",
                "https://live.staticflickr.com/65535/52694936484_e8d084e82e_b.jpg",
                "https://live.staticflickr.com/4125/4963441464_9f3aec7b59_c.jpg",
                "https://live.staticflickr.com/2420/2418406675_fda5ff97d4_b.jpg",
                "https://live.staticflickr.com/2255/2313520921_efc8472de3_b.jpg",
                "https://live.staticflickr.com/3212/2324566276_79e1ce3a0e_b.jpg",
                "https://live.staticflickr.com/3041/2309906282_58a654ff08_b.jpg",
                "https://live.staticflickr.com/3208/2288066822_8ede1fb627_b.jpg",
                "https://live.staticflickr.com/2367/2267953533_5e3e7d3157_b.jpg"
            ],
            bn: [
                "https://images.unsplash.com/photo-1470124114660-23b044d0ecfb?q=80&w=2070&auto=format&fit=crop",
                "https://images.unsplash.com/photo-1502164980785-f8aa41d53611?q=80&w=2070&auto=format&fit=crop"
            ],
            naturaleza: [
                "https://live.staticflickr.com/7650/16754653431_7a1503b807_b.jpg",
                "https://live.staticflickr.com/2326/2345296962_a97217acb6_b.jpg",
                "https://live.staticflickr.com/8868/18278700708_8394b69704_b.jpg",
                "https://live.staticflickr.com/2341/2264390853_b6fd799e75_b.jpg",
                "https://live.staticflickr.com/2026/2343710716_7748742aee_b.jpg",
                "https://live.staticflickr.com/3173/2844931279_91d4e4286d_b.jpg",
                "https://live.staticflickr.com/2419/2278598351_6be6d2cf80_b.jpg",
                "https://live.staticflickr.com/2119/2312223172_dc3bd7f45a_b.jpg",
                "https://live.staticflickr.com/2391/2222751812_e9c3f377e1_b.jpg",
                "https://live.staticflickr.com/3351/5716163996_97466d3171_b.jpg",
                "https://live.staticflickr.com/2369/5733703146_c3bd6ca718_b.jpg",
                "https://live.staticflickr.com/3271/2804839401_3d818e4812_b.jpg",
                "https://live.staticflickr.com/3073/3067065257_4ed169b6ea_b.jpg",
                "https://live.staticflickr.com/3220/2809887821_80b344c4e8_b.jpg",
                "https://live.staticflickr.com/2368/2250393234_3b68c8f2dd_b.jpg",
                "https://live.staticflickr.com/65535/53326487427_c1a97fc7ff_b.jpg",
                
            ],
            macros: [
                "https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg",
                "https://live.staticflickr.com/2382/2420606177_066aca122c_b.jpg",
                "https://live.staticflickr.com/3193/2434531398_d07439347f_b.jpg",
                "https://live.staticflickr.com/3121/2464264720_9ef862878f_b.jpg",
                "https://live.staticflickr.com/3387/3314202010_0a47624a5e_b.jpg",
                "https://live.staticflickr.com/3204/2448396549_6cdb515e47_b.jpg",
                "https://live.staticflickr.com/3354/3638682340_a93aa9cb2a_b.jpg",
                "https://live.staticflickr.com/3153/2791599309_dcb14890a9_b.jpg"
            ]
        };

        let currentActiveGallery = [];
        let currentIndex = 0;

        function showHome() {
            document.getElementById('home-page').style.display = 'grid';
            document.getElementById('folder-view').style.display = 'none';
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
            window.scrollTo(0,0);
        }

        function openFolder(id) {
            currentActiveGallery = GALLERIES[id];
            const container = document.getElementById('masonry-container');
            container.innerHTML = '';
            
            currentActiveGallery.forEach((url, idx) => {
                const item = document.createElement('div');
                item.className = 'masonry-item';
                item.onclick = (e) => { e.stopPropagation(); openViewer(idx); };
                item.innerHTML = `<img src="${url}" loading="lazy" draggable="false">`;
                container.appendChild(item);
            });

            document.getElementById('home-page').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function openViewer(index) {
            currentIndex = index;
            document.getElementById('viewer-img').src = currentActiveGallery[currentIndex];
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.getElementById('main-header').style.opacity = '0';
            document.getElementById('main-footer').style.opacity = '0';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('main-header').style.opacity = '1';
            document.getElementById('main-footer').style.opacity = '1';
        }

        function changePhoto(step) {
            currentIndex = (currentIndex + step + currentActiveGallery.length) % currentActiveGallery.length;
            document.getElementById('viewer-img').src = currentActiveGallery[currentIndex];
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('viewer').style.display === 'flex') {
                if (e.key === 'ArrowRight') changePhoto(1);
                if (e.key === 'ArrowLeft') changePhoto(-1);
                if (e.key === 'Escape') closeViewer();
            }
        });
    </script>
</body>
</html>
