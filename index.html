<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>rodante | Archivo Visual</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="logo%20inclinado%20negro.png?v=14">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        
        :root { --bg: #030303; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- ELEMENTOS FIJOS --- */
        .fixed-layer {
            position: fixed;
            left: 0;
            width: 100%;
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .header {
            top: 0;
            padding: 40px 30px;
            background: linear-gradient(to bottom, var(--bg) 60%, transparent);
        }

        .footer {
            bottom: 0;
            padding: 20px 30px;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
        }

        .layer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
        }

        /* --- LOGOTIPO --- */
        .header-icon {
            width: 26px; 
            height: 26px;
            filter: invert(1); 
            opacity: 0.5;
            cursor: pointer;
            transition: opacity 0.5s;
        }
        .header-icon:hover { opacity: 1; }

        .logo-text {
            font-weight: 100;
            letter-spacing: 1.2em;
            text-transform: lowercase;
            font-size: 0.8rem;
            cursor: pointer;
            margin-right: -1.2em;
            opacity: 0.6;
        }

        /* --- FOOTER REFINADO --- */
        .footer-text {
            font-size: 9px;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            line-height: 1.6;
        }

        .credit-text {
            display: block;
            font-size: 7.5px; /* Texto más pequeño para el diseño */
            opacity: 0.6;
            margin-top: 2px;
            text-transform: lowercase;
            letter-spacing: 0.1em;
        }

        .blue-link {
            color: #3b82f6; 
            text-decoration: none;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .blue-link:hover { opacity: 1; text-decoration: underline; }

        /* --- CONTENIDO --- */
        main { padding-bottom: 120px; }

        .main-gallery {
            padding: 160px 15px 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(25vh, auto);
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: #050505;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transition: transform 4s cubic-bezier(0.19, 1, 0.22, 1), opacity 1.2s ease;
        }

        .photo-item:hover img { opacity: 0.85; transform: scale(1.02); }

        .cat-panoramicas { grid-column: span 2; height: 40vh; }
        .cat-retratos { grid-column: span 1; height: 35vh; }
        .cat-nocturnas { grid-column: span 1; height: 35vh; }
        .cat-macros { grid-column: span 2; height: 25vh; }

        .label {
            position: absolute;
            bottom: 25px;
            left: 25px;
            font-size: 9px;
            font-weight: 200;
            letter-spacing: 0.5em;
            text-transform: lowercase;
            padding: 6px 14px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(5px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- FOLDER VIEW --- */
        #folder-view {
            display: none;
            padding: 160px 20px 180px;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .masonry-container {
            columns: 3 300px;
            column-gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 15px;
            background: #080808;
            cursor: pointer;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            opacity: 0.75;
            transition: opacity 0.8s ease;
        }

        .back-btn {
            font-size: 8px; 
            letter-spacing: 0.5em;
            text-transform: lowercase; 
            color: rgba(255,255,255,0.4); 
            cursor: pointer;
            margin-bottom: 12px;
        }

        /* --- VISOR --- */
        #viewer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.99); z-index: 2000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(15px);
        }
        #viewer img { max-width: 90vw; max-height: 85vh; object-fit: contain; }
        .viewer-close { position: absolute; top: 30px; right: 30px; font-size: 9px; letter-spacing: 0.4em; cursor: pointer; opacity: 0.4; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); padding: 40px; cursor: pointer; font-size: 30px; font-weight: 100; opacity: 0; transition: opacity 0.3s; color: white; }
        #viewer:hover .nav-btn { opacity: 0.2; }
        .nav-btn:hover { opacity: 0.9 !important; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .header, .footer { padding: 20px 20px; }
            .main-gallery { padding: 130px 10px 40px; grid-template-columns: 1fr; }
            .cat-panoramicas, .cat-retratos, .cat-nocturnas, .cat-macros { grid-column: span 1; height: 30vh; }
            .masonry-container { columns: 2; }
            .footer-text { font-size: 8px; }
            .credit-text { font-size: 7px; }
        }

        @media (max-width: 480px) {
            .masonry-container { columns: 1; }
            .nav-btn { display: none; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="fixed-layer header">
        <div class="layer-content">
            <img src="logo%20inclinado%20negro.png" class="header-icon" alt="Logo rodante" onclick="showHome()">
            <div class="logo-text" onclick="showHome()">rodante</div>
        </div>
    </header>

    <main>
        <section id="home-page" class="main-gallery">
            <div class="photo-item cat-panoramicas" onclick="openFolder('panoramicas')">
                <img src="https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg" alt="Panorámicas" draggable="false">
                <div class="label">panorámicas</div>
            </div>
            
            <div class="photo-item cat-retratos" onclick="openFolder('retratos')">
                <img src="https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg" alt="Retratos" draggable="false">
                <div class="label">retratos</div>
            </div>

            <div class="photo-item cat-nocturnas" onclick="openFolder('nocturnas')">
                <img src="https://live.staticflickr.com/7244/7310126402_b01371ba26_b.jpg" alt="Nocturnas" draggable="false">
                <div class="label">nocturnas</div>
            </div>

            <div class="photo-item cat-macros" onclick="openFolder('macros')">
                <img src="https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg" alt="Macros" draggable="false">
                <div class="label">macros</div>
            </div>
        </section>

        <section id="folder-view">
            <div id="masonry-container" class="masonry-container"></div>
        </section>
    </main>

    <footer class="fixed-layer footer">
        <div class="layer-content">
            <div id="back-nav" style="display: none;">
                <div class="back-btn" onclick="showHome()">[ volver al inicio ]</div>
            </div>
            <div class="footer-text">
                © <span id="year"></span> rodante — todos los derechos reservados
                <span class="credit-text">
                    creación y diseño de <span class="blue-link" onclick="showHome()">rodante</span>
                </span>
            </div>
        </div>
    </footer>

    <div id="viewer" onclick="closeViewer()">
        <div class="viewer-close">CERRAR</div>
        <div class="nav-btn" style="left:0" onclick="event.stopPropagation(); changePhoto(-1)">‹</div>
        <div class="nav-btn" style="right:0" onclick="event.stopPropagation(); changePhoto(1)">›</div>
        <img id="viewer-img" src="" draggable="false" oncontextmenu="return false;">
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const GALLERIES = {
            panoramicas: [
                "https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg",
                "https://live.staticflickr.com/65535/48927874868_a2a4a12457_b.jpg",
                "https://live.staticflickr.com/65535/48807744627_9cdb17a0e9_b.jpg",
                "https://live.staticflickr.com/5516/11324887693_50c01627dc_b.jpg",
                "https://live.staticflickr.com/65535/53352155968_fabb2f983c_b.jpg",
                "https://live.staticflickr.com/4854/31932303167_c8edaa4ea0_b.jpg",
                "https://live.staticflickr.com/7823/32998262948_9239dd45d6_b.jpg",
                "https://live.staticflickr.com/4907/32998262538_d0cdcd33c6_b.jpg",
                "https://live.staticflickr.com/4866/32998261958_31f81d651b_b.jpg",
                "https://live.staticflickr.com/8877/17570982642_b74be2ab95_b.jpg",
                "https://live.staticflickr.com/5316/14172388132_5c5b33d4d5_b.jpg",
                "https://live.staticflickr.com/8246/8479454738_c03df0a782_b.jpg",
                "https://live.staticflickr.com/8399/8606677981_7940ae5062_b.jpg",
                "https://live.staticflickr.com/4046/4472556919_b485a2706e_b.jpg"
            ],
            retratos: [
                "https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg",
                "https://live.staticflickr.com/65535/55143210951_f624e6131a_b.jpg",
                "https://live.staticflickr.com/3004/2451484681_99203ea098_b.jpg",
                "https://live.staticflickr.com/8174/7988106553_5d46562d61_b.jpg",
                "https://live.staticflickr.com/65535/52838568502_2a9be494af_b.jpg",
                "https://live.staticflickr.com/65535/52858631615_0d891f59af_b.jpg",
                "https://live.staticflickr.com/4089/4974819976_fe6ebed28d_b.jpg",
                "https://live.staticflickr.com/3041/2470906563_807780a89a_b.jpg",
                "https://live.staticflickr.com/2569/4039397686_9e42450769_b.jpg",
                "https://live.staticflickr.com/65535/52890559297_7c0f74b02a_b.jpg",
                "https://live.staticflickr.com/8653/16628204166_df9204e300_b.jpg",
                "https://live.staticflickr.com/3075/2674106756_5bcd6bcf72_b.jpg",
                "https://live.staticflickr.com/2648/4092163383_55962ba163_b.jpg",
                "https://live.staticflickr.com/2940/14173943340_9efd53125e_b.jpg",
                "https://live.staticflickr.com/5518/11665162033_6263295026_b.jpg",
                "https://live.staticflickr.com/2492/3761185143_c247bd897a_b.jpg",
                "https://live.staticflickr.com/2014/5787212615_fe57b5e781_b.jpg",
                "https://live.staticflickr.com/3005/2364100184_172f56af36_b.jpg",
                "https://live.staticflickr.com/3281/2821723518_54a5f4b2e9_b.jpg",
                "https://live.staticflickr.com/2640/3859153972_cf9c20e1aa_b.jpg",
                "https://live.staticflickr.com/3705/11354515085_b62e41b96f_b.jpg",
                "https://live.staticflickr.com/2454/3671874644_03a46af8a1_b.jpg"
            ],
            nocturnas: [
                "https://live.staticflickr.com/7244/7310126402_b01371ba26_b.jpg",
                "https://live.staticflickr.com/65535/49229687873_84d7ce7bdc_b.jpg",
                "https://live.staticflickr.com/4154/4968702353_5a241dce18_b.jpg",
                "https://live.staticflickr.com/4102/4931251525_936a378b6a_b.jpg",
                "https://live.staticflickr.com/4019/4230096685_b63cdb3eee_b.jpg",
                "https://live.staticflickr.com/4120/4940550217_a9e495b5d0_b.jpg",
                "https://live.staticflickr.com/4040/5154781630_266143af5c_b.jpg",
                "https://live.staticflickr.com/4053/5166378119_dc40043f46_b.jpg",
                "https://live.staticflickr.com/6084/6145248770_0edfbd76b2_b.jpg",
                "https://live.staticflickr.com/3319/3186819847_b09b20354c_b.jpg",
                "https://live.staticflickr.com/2573/3701168202_1a59e6fa34_b.jpg",
                "https://live.staticflickr.com/3386/3566218504_ebd31e17f8_b.jpg",
                "https://live.staticflickr.com/3375/3628957044_c4362f3cfa_b.jpg"
            ],
            macros: [
                "https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg",
                "https://live.staticflickr.com/2382/2420606177_066aca122c_b.jpg"
            ]
        };

        let currentActiveGallery = [];
        let currentIndex = 0;

        function showHome() {
            document.getElementById('home-page').style.display = 'grid';
            document.getElementById('folder-view').style.display = 'none';
            document.getElementById('back-nav').style.display = 'none';
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
            window.scrollTo(0,0);
        }

        function openFolder(id) {
            currentActiveGallery = GALLERIES[id];
            const container = document.getElementById('masonry-container');
            container.innerHTML = '';
            
            currentActiveGallery.forEach((url, idx) => {
                const item = document.createElement('div');
                item.className = 'masonry-item';
                item.onclick = (e) => { e.stopPropagation(); openViewer(idx); };
                item.innerHTML = `<img src="${url}" loading="lazy" draggable="false" oncontextmenu="return false;">`;
                container.appendChild(item);
            });

            document.getElementById('home-page').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
            document.getElementById('back-nav').style.display = 'block';
            window.scrollTo(0,0);
        }

        function openViewer(index) {
            currentIndex = index;
            document.getElementById('viewer-img').src = currentActiveGallery[currentIndex];
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.querySelector('.header').style.opacity = '0';
            document.querySelector('.footer').style.opacity = '0';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.querySelector('.header').style.opacity = '1';
            document.querySelector('.footer').style.opacity = '1';
        }

        function changePhoto(step) {
            currentIndex = (currentIndex + step + currentActiveGallery.length) % currentActiveGallery.length;
            document.getElementById('viewer-img').src = currentActiveGallery[currentIndex];
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('viewer').style.display === 'flex') {
                if (e.key === 'ArrowRight') changePhoto(1);
                if (e.key === 'ArrowLeft') changePhoto(-1);
                if (e.key === 'Escape') closeViewer();
            }
        });
    </script>
</body>
</html>
