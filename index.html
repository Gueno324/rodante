        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;

            mask-image: linear-gradient(to bottom, black 0 72%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 0 72%, transparent 100%);
        }
        .header::before{
            content:"";
            position:absolute;
            inset:0;
            backdrop-filter: blur(16px) saturate(110%);
            -webkit-backdrop-filter: blur(16px) saturate(110%);
            pointer-events:none;
        }
        .footer { bottom: 0; padding: 20px 24px 28px; background: linear-gradient(to top, rgba(3,3,3,0.92) 0%, rgba(3,3,3,0.6) 50%, transparent 100%); opacity: 0; transform: translateY(14px); }

        .layer-content { position:relative; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: auto; }
        .brand-mark {
            width: 56px; height: 56px; border-radius: 999px;
            display:grid; place-items:center;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 10px 35px rgba(0,0,0,0.35), inset 0 0 30px rgba(255,255,255,0.03);
            transition: transform .5s ease, border-color .5s ease, background .5s ease;
        }
        .brand-mark:hover { transform: translateY(-2px) scale(1.03); border-color: rgba(255,255,255,0.22); }
        .header-icon { width: 24px; height: 24px; filter: invert(1); opacity: 0.72; cursor: pointer; transition: 0.5s; }
        .header-icon:hover { opacity: 1; }

        .logo-text { 
            font-weight: 200; letter-spacing: 1.45em; text-transform: lowercase; font-size: 0.9rem; 
            cursor: pointer; margin-right: -1.45em; opacity: 0.9; 
            text-shadow: 0 0 18px rgba(255,255,255,0.08);
            transition: letter-spacing .45s ease, opacity .45s ease, transform .45s ease;
        }
        .sub-logo {
            font-size: 10px;
            letter-spacing: 0.58em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.42);
            margin-right: -0.58em;
            transition: opacity .45s ease, transform .45s ease, letter-spacing .45s ease;
        }
        .header-line {
            width: min(240px, 46vw);
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: opacity .45s ease, transform .45s ease;
        }
        .footer-text { font-size: 9px; font-weight: 300; letter-spacing: 0.12em; color: rgba(255, 255, 255, 0.32); text-align: center; line-height: 1.8; }
        .footer-link { color: rgba(255,255,255,0.72); text-decoration: underline; text-underline-offset: 0.22em; transition: color .35s ease, opacity .35s ease; }
        .footer-link:hover { color: rgba(255,255,255,1); }

        .header.compact { transform: translateY(-8px); }
        .header.compact .brand-mark { width: 44px; height: 44px; }
        .header.compact .logo-text { font-size: 0.75rem; letter-spacing: 1.1em; margin-right: -1.1em; opacity: 0.72; transform: translateY(-1px); }
        .header.compact .sub-logo { letter-spacing: 0.45em; margin-right: -0.45em; opacity: 0.28; transform: translateY(-3px); }
        .header.compact .header-line { opacity: 0.3; transform: scaleX(.85); }

        /* --- GRID PRINCIPAL --- */
        .main-gallery {
            padding: 160px 15px 180px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(20vh, auto);
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-item { 
            position: relative; overflow: hidden; cursor: pointer; background: #050505; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 55px rgba(0,0,0,0.32);
            transform: translateY(28px);
            opacity: 0;
            transition: transform 1.1s cubic-bezier(0.19, 1, 0.22, 1), opacity 1.1s ease, border-color .45s ease, box-shadow .45s ease;
        }
        .photo-item.is-visible { transform: translateY(0); opacity: 1; }
        .photo-item::before{
            content:"";
            position:absolute; inset:0;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0) 35%, rgba(0,0,0,0.3) 100%);

        }
        .photo-item::after{
            content:"";
            position:absolute; inset:auto 18px 16px 18px; height:1px;
            background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.12), rgba(255,255,255,0));
            opacity:.8; z-index:2;
        }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.42; filter: saturate(.95) contrast(1.02); transition: transform 4.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 1.2s ease, filter .9s ease; }
        .photo-item:hover { border-color: rgba(255,255,255,0.12); box-shadow: 0 26px 68px rgba(0,0,0,0.42); }
        .photo-item:hover img { opacity: 0.92; transform: scale(1.045); filter: saturate(1.02) contrast(1.06); }

        .cat-xl { grid-column: span 2; height: 45vh; }
        .cat-lg { grid-column: span 1; height: 35vh; }

        .label {
            position: absolute; bottom: 24px; left: 24px; z-index: 3;
            font-size: 9px; font-weight: 200; letter-spacing: 0.56em;
            text-transform: lowercase; padding: 10px 16px; color: rgba(255, 255, 255, 0.58);
            background: rgba(255, 255, 255, 0.035); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            box-shadow: inset 0 0 24px rgba(255,255,255,0.02);
            transition: color .4s ease, background .4s ease, border-color .4s ease, transform .4s ease;

        .photo-item:hover .label {
            color: rgba(255,255,255,0.82);
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.14);

        /* --- MASONRY VIEW --- */
        #folder-view { display: none; padding: 160px 20px 200px; animation: fadeIn 0.8s ease; }

        .masonry-container { columns: 3 300px; column-gap: 15px; max-width: 1400px; margin: 0 auto; }
        .masonry-item { break-inside: avoid; margin-bottom: 15px; background: #080808; cursor: pointer; position: relative; }
        .masonry-item img { width: 100%; display: block; opacity: 0.8; transition: 0.5s; pointer-events: none; }

        #viewer {

        .viewer-shield { position: absolute; inset: 0; z-index: 2001; }
        #viewer img { max-width: 95vw; max-height: 90vh; object-fit: contain; position: relative; z-index: 2002; }
        
        .viewer-info { position: absolute; bottom: 40px; text-align: center; width: 100%; font-size: 10px; letter-spacing: 0.3em; color: rgba(255,255,255,0.5); text-transform: lowercase; z-index: 2003; }
        .viewer-close { position: absolute; top: 40px; right: 40px; font-size: 10px; letter-spacing: 0.4em; cursor: pointer; opacity: 0.4; z-index: 2003; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); padding: 50px; cursor: pointer; font-size: 40px; font-weight: 100; opacity: 0; transition: 0.3s; color: white; background: transparent; border: none; z-index: 2003; }
        #viewer:hover .nav-btn { opacity: 0.3; }

            .main-gallery { grid-template-columns: 1fr; padding-top: 128px; padding-bottom: 160px; gap: 14px; }

            .nav-btn { display: none; }

    <script>
        const header = document.getElementById('main-header');
        const footer = document.getElementById('main-footer');
        const heroItems = [...document.querySelectorAll('.photo-item')];

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) entry.target.classList.add('is-visible');
            });
        }, { threshold: 0.18 });

        heroItems.forEach((item, index) => {
            item.style.transitionDelay = `${index * 80}ms`;
            revealObserver.observe(item);
        });

        function syncChrome() {
            const y = window.scrollY || 0;
            const headerFade = Math.max(0, 1 - y / 420);
            const blur = Math.min(18, y / 18);
            header.style.opacity = String(Math.max(0.15, headerFade));
            header.style.filter = `blur(${blur * 0.16}px)`;
            header.classList.toggle('compact', y > 40);

            const viewportBottom = y + window.innerHeight;
            const docHeight = document.documentElement.scrollHeight;
            const footerActive = viewportBottom > docHeight - 160;
            footer.style.opacity = footerActive ? '1' : '0';
            footer.style.transform = footerActive ? 'translateY(0)' : 'translateY(14px)';
        }

        window.addEventListener('scroll', syncChrome, { passive: true });

        let currentActiveGallery = [];
        let currentIndex = 0;

        function showHome() {
            document.getElementById('home-page').style.display = 'grid';
            document.getElementById('folder-view').style.display = 'none';
            document.body.style.overflow = 'auto';
            window.scrollTo(0,0);
        }

        function openFolder(id) {
            currentActiveGallery = GALLERIES[id];
            const container = document.getElementById('masonry-container');
            container.innerHTML = '';
            currentActiveGallery.forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'masonry-item';
                el.onclick = () => openViewer(idx);
                el.innerHTML = `<img src="${item.url}" draggable="false" loading="lazy" referrerpolicy="no-referrer" alt="${item.title}"><div class="img-caption">${item.title}</div>`;
                container.appendChild(el);
            });
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function openViewer(index) {
            currentIndex = index;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.getElementById('main-header').style.opacity = '0';
            document.getElementById('main-footer').style.opacity = '0';
        }

        function updateViewer() {
            const item = currentActiveGallery[currentIndex];
            const img = document.getElementById('viewer-img');
            img.style.opacity = '0';
            img.src = item.url;
            img.onload = () => img.style.opacity = '1';
            document.getElementById('viewer-caption').textContent = item.title;
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
            syncChrome();
        }

        function changePhoto(step) {
            currentIndex = (currentIndex + step + currentActiveGallery.length) % currentActiveGallery.length;
            updateViewer();
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('viewer').style.display === 'flex') {
                if (e.key === 'ArrowRight') changePhoto(1);
                if (e.key === 'ArrowLeft') changePhoto(-1);
                if (e.key === 'Escape') closeViewer();
            }
        });
    </script>
