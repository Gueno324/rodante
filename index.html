    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');

        :root { --bg: #030303; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .fixed-layer { position: fixed; left: 0; width: 100%; z-index: 1000; pointer-events: none; }
        .header { top: 0; padding: 40px 30px; background: linear-gradient(to bottom, var(--bg) 60%, transparent); }
        .footer { bottom: 0; padding: 20px 30px; background: linear-gradient(to top, var(--bg) 60%, transparent); }

        .layer-content { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: auto; }
        .header-icon { width: 26px; height: 26px; filter: invert(1); opacity: 0.5; cursor: pointer; transition: 0.5s; }
        .header-icon:hover { opacity: 1; }

        .logo-text { font-weight: 100; letter-spacing: 1.2em; text-transform: lowercase; font-size: 0.8rem; cursor: pointer; margin-right: -1.2em; opacity: 0.6; }
        .footer-text { font-size: 9px; font-weight: 300; letter-spacing: 0.05em; color: rgba(255, 255, 255, 0.35); text-align: center; line-height: 1.6; }

        .main-gallery {
            padding: 160px 15px 180px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(20vh, auto);
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-item { position: relative; overflow: hidden; cursor: pointer; background: #050505; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: transform 4s cubic-bezier(0.19, 1, 0.22, 1), opacity 1.2s ease; }
        .photo-item:hover img { opacity: 0.85; transform: scale(1.02); }

        .cat-xl { grid-column: span 2; height: 45vh; }
        .cat-lg { grid-column: span 1; height: 35vh; }

        .label {
            position: absolute; bottom: 25px; left: 25px; font-size: 9px; font-weight: 200; letter-spacing: 0.5em;
            text-transform: lowercase; padding: 6px 14px; color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(5px); border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        #folder-view { display: none; padding: 160px 20px 200px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .masonry-container { columns: 3 300px; column-gap: 15px; max-width: 1400px; margin: 0 auto; }
        .masonry-item { break-inside: avoid; margin-bottom: 15px; background: #080808; cursor: pointer; position: relative; }
        .masonry-item img { width: 100%; display: block; opacity: 0.8; transition: 0.5s; pointer-events: none; }
        .masonry-item:hover img { opacity: 1; }

        .img-caption {
            position: absolute; bottom: 10px; left: 10px; font-size: 7px;
            letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4);
            pointer-events: none; opacity: 0; transition: 0.3s;
        }
        .masonry-item:hover .img-caption { opacity: 1; }

        .back-btn { font-size: 8px; letter-spacing: 0.5em; text-transform: lowercase; color: rgba(255,255,255,0.4); cursor: pointer; margin-bottom: 30px; display: inline-block; background: none; border: none; padding: 10px 0; }

        #viewer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000;
            align-items: center; justify-content: center; backdrop-filter: blur(25px);
        }
        .viewer-shield { position: absolute; inset: 0; z-index: 2001; }
        #viewer img { max-width: 95vw; max-height: 90vh; object-fit: contain; position: relative; z-index: 2002; }

        .viewer-info { position: absolute; bottom: 40px; text-align: center; width: 100%; font-size: 10px; letter-spacing: 0.3em; color: rgba(255,255,255,0.5); text-transform: lowercase; z-index: 2003; }
        .viewer-close { position: absolute; top: 40px; right: 40px; font-size: 10px; letter-spacing: 0.4em; cursor: pointer; opacity: 0.4; z-index: 2003; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); padding: 50px; cursor: pointer; font-size: 40px; font-weight: 100; opacity: 0; transition: 0.3s; color: white; background: transparent; border: none; z-index: 2003; }
        #viewer:hover .nav-btn { opacity: 0.3; }
        .nav-btn:hover { opacity: 1 !important; }

        @media (max-width: 768px) {
            .main-gallery { grid-template-columns: 1fr; padding-top: 120px; }
            .cat-xl, .cat-lg { grid-column: span 1; height: 35vh; }
            .masonry-container { columns: 2; }
            .nav-btn { display: none; }
        }
    </style>
</head>

        let currentActiveGallery = [];
        let currentIndex = 0;

        function showHome() {
            document.getElementById('home-page').style.display = 'grid';
            document.getElementById('folder-view').style.display = 'none';
            document.body.style.overflow = 'auto';
            window.scrollTo(0, 0);
        }

        function openFolder(id) {
            currentActiveGallery = GALLERIES[id];
            const container = document.getElementById('masonry-container');
            container.innerHTML = '';
            currentActiveGallery.forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'masonry-item';
                el.onclick = () => openViewer(idx);
                el.innerHTML = `<img src="${item.url}" draggable="false" alt="${item.title}" loading="lazy" decoding="async" referrerpolicy="no-referrer"><div class="img-caption">${item.title}</div>`;
                container.appendChild(el);
            });
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function openViewer(index) {
            currentIndex = index;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.getElementById('main-header').style.opacity = '0';
        }

        function updateViewer() {
            const item = currentActiveGallery[currentIndex];
            const img = document.getElementById('viewer-img');
            img.style.opacity = '0';
            img.src = item.url;
            img.onload = () => img.style.opacity = '1';
            document.getElementById('viewer-caption').textContent = item.title;
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('main-header').style.opacity = '1';
        }

        function changePhoto(step) {
            currentIndex = (currentIndex + step + currentActiveGallery.length) % currentActiveGallery.length;
            updateViewer();
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('viewer').style.display === 'flex') {
                if (e.key === 'ArrowRight') changePhoto(1);
                if (e.key === 'ArrowLeft') changePhoto(-1);
                if (e.key === 'Escape') closeViewer();
            }
        });
    </script>
