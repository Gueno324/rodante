 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>rodante | Archivo Visual</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="logo%20inclinado%20negro.png?v=8">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        
        :root { --bg: #030303; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- CABECERA --- */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
            z-index: 1000;
            background: linear-gradient(to bottom, var(--bg) 40%, transparent);
            pointer-events: none;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
        }

        .header-icon {
            width: 30px; 
            height: 30px;
            filter: invert(1); 
            opacity: 0.8;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .logo {
            font-weight: 100;
            letter-spacing: 1.2em;
            text-transform: lowercase;
            font-size: 0.95rem;
            cursor: pointer;
            margin-right: -1.2em; 
        }

        /* --- GRID ASIMÉTRICO CATEGORÍAS --- */
        .main-gallery {
            padding: 180px 15px 60px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(35vh, auto);
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .photo-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: #0a0a0a;
            border-radius: 2px;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: transform 2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s ease;
        }

        .photo-item:hover img { opacity: 1; transform: scale(1.05); }

        /* Asimetría Controlada para Categorías */
        .cat-panoramicas { grid-column: span 2; height: 50vh; }
        .cat-retratos { grid-row: span 1; }
        .cat-macros { grid-row: span 1; }

        .label {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: lowercase;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255,255,255,0.5);
            z-index: 10;
        }

        /* --- VISTA DE CARPETA MASONRY --- */
        #folder-view {
            display: none;
            padding: 200px 15px 80px;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .masonry-container {
            columns: 3 350px;
            column-gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
            background: #0d0d0d;
            cursor: pointer;
            overflow: hidden;
            border-radius: 2px;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            opacity: 0.8;
            transition: opacity 0.5s, transform 0.8s ease;
        }

        .masonry-item:hover img { opacity: 1; transform: scale(1.03); }

        .back-btn {
            display: block; 
            margin: 0 auto 60px; 
            font-size: 10px; 
            letter-spacing: 0.5em;
            text-transform: lowercase; 
            color: rgba(255,255,255,0.4); 
            cursor: pointer; 
            text-align: center;
        }
        .back-btn:hover { color: white; }

        /* --- VISOR --- */
        #viewer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(20px);
        }
        #viewer img { max-width: 90vw; max-height: 85vh; object-fit: contain; }
        .viewer-close { position: absolute; top: 40px; right: 40px; font-size: 10px; letter-spacing: 0.3em; cursor: pointer; opacity: 0.6; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); padding: 60px; cursor: pointer; font-size: 40px; font-weight: 100; opacity: 0; transition: opacity 0.3s; color: white; }
        #viewer:hover .nav-btn { opacity: 0.3; }
        .nav-btn:hover { opacity: 1 !important; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .main-gallery { grid-template-columns: 1fr; grid-auto-rows: 40vh; }
            .cat-panoramicas, .cat-retratos, .cat-macros { grid-column: span 1; height: 40vh; }
            .masonry-container { columns: 2; }
        }

        @media (max-width: 480px) {
            .masonry-container { columns: 1; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <img src="logo%20inclinado%20negro.png" class="header-icon" alt="Logo" onclick="showHome()">
            <div class="logo" onclick="showHome()">rodante</div>
        </div>
    </header>

    <main>
        <!-- Home con SOLO las 3 categorías -->
        <section id="home-page" class="main-gallery">
            <div class="photo-item cat-panoramicas" onclick="openFolder('panoramicas')">
                <img src="https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg" alt="Panorámicas">
                <div class="label">panorámicas</div>
            </div>
            
            <div class="photo-item cat-retratos" onclick="openFolder('retratos')">
                <img src="https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg" alt="Retratos">
                <div class="label">retratos</div>
            </div>

            <div class="photo-item cat-macros" onclick="openFolder('macros')">
                <img src="https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg" alt="Macros">
                <div class="label">macros</div>
            </div>
        </section>

        <!-- Vista de Carpeta con todas las fotos de la galería seleccionada -->
        <section id="folder-view">
            <div class="back-btn" onclick="showHome()">[ volver al inicio ]</div>
            <div id="masonry-container" class="masonry-container"></div>
        </section>
    </main>

    <div id="viewer" onclick="closeViewer()">
        <div class="viewer-close">CERRAR</div>
        <div class="nav-btn" style="left:0" onclick="event.stopPropagation(); changePhoto(-1)">‹</div>
        <div class="nav-btn" style="right:0" onclick="event.stopPropagation(); changePhoto(1)">›</div>
        <img id="viewer-img" src="">
    </div>

    <script>
        const GALLERIES = {
            panoramicas: [
                "https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg",
                "https://live.staticflickr.com/65535/48927874868_a2a4a12457_b.jpg",
                "https://live.staticflickr.com/65535/48807744627_9cdb17a0e9_b.jpg",
                "https://live.staticflickr.com/5516/11324887693_50c01627dc_b.jpg",
                "https://live.staticflickr.com/65535/53352155968_fabb2f983c_b.jpg",
                "https://live.staticflickr.com/4854/31932303167_c8edaa4ea0_b.jpg",
                "https://live.staticflickr.com/7823/32998262948_9239dd45d6_b.jpg",
                "https://live.staticflickr.com/4907/32998262538_d0cdcd33c6_b.jpg",
                "https://live.staticflickr.com/4866/32998261958_31f81d651b_b.jpg",
                "https://live.staticflickr.com/8877/17570982642_b74be2ab95_b.jpg",
                "https://live.staticflickr.com/5316/14172388132_5c5b33d4d5_b.jpg",
                "https://live.staticflickr.com/8246/8479454738_c03df0a782_b.jpg",
                "https://live.staticflickr.com/8399/8606677981_7940ae5062_b.jpg",
                "https://live.staticflickr.com/4046/4472556919_b485a2706e_b.jpg"
            ],
            retratos: [
                "https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg",
                "https://live.staticflickr.com/65535/55143210951_f624e6131a_b.jpg",
                "https://live.staticflickr.com/3004/2451484681_99203ea098_b.jpg",
                "https://live.staticflickr.com/8174/7988106553_5d46562d61_b.jpg",
                "https://live.staticflickr.com/65535/52838568502_2a9be494af_b.jpg",
                "https://live.staticflickr.com/65535/52858631615_0d891f59af_b.jpg",
                "https://live.staticflickr.com/4089/4974819976_fe6ebed28d_b.jpg",
                "https://live.staticflickr.com/3041/2470906563_807780a89a_b.jpg",
                "https://live.staticflickr.com/2569/4039397686_9e42450769_b.jpg",
                "https://live.staticflickr.com/65535/52890559297_7c0f74b02a_b.jpg",
                "https://live.staticflickr.com/8653/16628204166_df9204e300_b.jpg",
                "https://live.staticflickr.com/3075/2674106756_5bcd6bcf72_b.jpg",
                "https://live.staticflickr.com/2648/4092163383_55962ba163_b.jpg",
                "https://live.staticflickr.com/2940/14173943340_9efd53125e_b.jpg",
                "https://live.staticflickr.com/5518/11665162033_6263295026_b.jpg",
                "https://live.staticflickr.com/2492/3761185143_c247bd897a_b.jpg",
                "https://live.staticflickr.com/2014/5787212615_fe57b5e781_b.jpg",
                "https://live.staticflickr.com/3005/2364100184_172f56af36_b.jpg",
                "https://live.staticflickr.com/3281/2821723518_54a5f4b2e9_b.jpg",
                "https://live.staticflickr.com/2640/3859153972_cf9c20e1aa_b.jpg",
                "https://live.staticflickr.com/3705/11354515085_b62e41b96f_b.jpg",
                "https://live.staticflickr.com/2454/3671874644_03a46af8a1_b.jpg"
            ],
            macros: [
                "https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg",
                "https://live.staticflickr.com/2382/2420606177_066aca122c_b.jpg"
            ]
        };

        let currentActiveGallery = [];
        let currentIndex = 0;

        function showHome() {
            document.getElementById('home-page').style.display = 'grid';
            document.getElementById('folder-view').style.display = 'none';
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
            window.scrollTo(0,0);
        }

        function openFolder(id) {
            currentActiveGallery = GALLERIES[id];
            const container = document.getElementById('masonry-container');
            container.innerHTML = '';
            
            currentActiveGallery.forEach((url, idx) => {
                const item = document.createElement('div');
                item.className = 'masonry-item';
                item.onclick = (e) => { e.stopPropagation(); openViewer(idx); };
                item.innerHTML = `<img src="${url}" loading="lazy">`;
                container.appendChild(item);
            });

            document.getElementById('home-page').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function openViewer(index) {
            currentIndex = index;
            document.getElementById('viewer-img').src = currentActiveGallery[currentIndex];
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function changePhoto(step) {
            currentIndex = (currentIndex + step + currentActiveGallery.length) % currentActiveGallery.length;
            document.getElementById('viewer-img').src = currentActiveGallery[currentIndex];
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('viewer').style.display === 'flex') {
                if (e.key === 'ArrowRight') changePhoto(1);
                if (e.key === 'ArrowLeft') changePhoto(-1);
                if (e.key === 'Escape') closeViewer();
            }
        });
    </script>
</body>
</html>
