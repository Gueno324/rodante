<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>rodante | Archivo Visual</title>
    
    <!-- FAVICON (El icono que aparece en la pestaña del navegador) -->
    <link rel="icon" type="image/png" href="logo inclinado negro.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=Libre+Baskerville:ital@1&display=swap');
        
        :root { --bg: #030303; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- CABECERA --- */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 45px 30px;
            text-align: center;
            z-index: 1000;
            background: linear-gradient(to bottom, var(--bg) 60%, transparent);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* Logotipo de cabecera ajustado al texto */
        .header-icon {
            width: 32px; /* Tamaño aumentado acorde al texto */
            height: 32px;
            filter: invert(1); 
            opacity: 0.9;
            pointer-events: auto;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        .header-icon:hover { opacity: 0.6; }

        .logo {
            font-weight: 100;
            letter-spacing: 1.2em;
            text-transform: lowercase;
            font-size: 1.1rem;
            pointer-events: auto;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-right: -1.2em; /* Compensa el tracking del final para centrar */
        }
        .logo:hover { opacity: 0.6; }

        /* --- CONTENIDO PRINCIPAL --- */
        main {
            flex: 1;
        }

        /* --- PORTADA (NIVEL 1) --- */
        .main-gallery {
            display: flex;
            flex-direction: column;
            gap: 1vh;
            padding: 1vh;
            margin-top: 140px; 
            transition: opacity 0.5s ease;
        }

        .row {
            display: flex;
            gap: 1vh;
            height: 45vh;
        }

        .photo-item {
            position: relative;
            flex: 1;
            overflow: hidden;
            cursor: pointer;
            background: #0a0a0a;
            transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (min-width: 1024px) {
            .photo-item:hover { flex: 2; }
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: transform 1.2s ease, opacity 0.6s ease;
        }

        .photo-item:hover img {
            opacity: 1;
            transform: scale(1.05);
        }

        .label {
            position: absolute;
            bottom: 25px;
            left: 25px;
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: lowercase;
            padding: 6px 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-left: 1px solid rgba(255,255,255,0.3);
        }

        /* --- VISTA DE CARPETA (NIVEL 2) --- */
        #folder-view {
            display: none;
            padding: 200px 20px 40px;
            min-height: 100vh;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .grid-item {
            aspect-ratio: 1/1;
            overflow: hidden;
            cursor: pointer;
            background: #0d0d0d;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, opacity 0.4s ease;
            opacity: 0.7;
        }

        .grid-item:hover img {
            transform: scale(1.08);
            opacity: 1;
        }

        .back-btn {
            display: block;
            margin: 0 auto 50px;
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: lowercase;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: color 0.3s;
            text-align: center;
            width: fit-content;
        }
        .back-btn:hover { color: white; }

        /* --- PIE DE PÁGINA --- */
        .footer {
            padding: 30px 20px; 
            text-align: center;
            font-weight: 200;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            margin-top: 30px; 
            border-top: 1px solid rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px; 
        }

        .footer a {
            color: #3b82f6; 
            text-decoration: none;
            transition: opacity 0.3s ease, border-bottom 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .footer a:hover {
            opacity: 0.8;
            border-bottom: 1px solid #3b82f6;
        }

        .footer-main {
            font-size: 9px;
            letter-spacing: 0.4em;
        }

        .footer-sub {
            font-size: 7.5px;
            letter-spacing: 0.35em;
            opacity: 0.7;
        }

        /* --- VISOR FULLSCREEN (NIVEL 3) --- */
        #viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #viewer img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        .viewer-controls {
            position: fixed;
            top: 40px;
            width: 100%;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            z-index: 2100;
            pointer-events: none;
        }

        .viewer-btn {
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            transition: color 0.3s;
            pointer-events: auto;
            background: rgba(0,0,0,0.2);
            padding: 5px 10px;
        }
        .viewer-btn:hover { color: white; }

        .nav-btn {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2050;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 40px;
            font-weight: 100;
        }
        .nav-btn:hover { opacity: 1; background: linear-gradient(to var(--dir), rgba(0,0,0,0.5), transparent); }
        .prev-btn { left: 0; --dir: right; }
        .next-btn { right: 0; --dir: left; }

        .counter {
            position: fixed;
            bottom: 40px;
            font-size: 10px;
            letter-spacing: 0.6em;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .header { padding: 30px 15px; }
            .logo { font-size: 1rem; }
            .header-icon { width: 26px; height: 26px; }
            .row { flex-direction: column; height: auto; }
            .photo-item { height: 55vh; }
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .nav-btn { width: 25%; opacity: 0.1; }
            .viewer-controls { top: 20px; padding: 0 20px; }
            .footer-main { font-size: 8px; }
            .footer-sub { font-size: 7px; }
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">

    <header class="header">
        <img src="logo inclinado negro.png" class="header-icon" alt="Logo Rodante" onclick="showHome()">
        <div class="logo" onclick="showHome()">rodante</div>
    </header>

    <main>
        <section id="home-page" class="main-gallery">
            <div class="row" style="height: 65vh;">
                <div class="photo-item" onclick="openFolder('retratos')">
                    <img src="https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg" alt="[imagen de retratos]">
                    <div class="label">retratos</div>
                </div>
            </div>
            <div class="row">
                <div class="photo-item" onclick="openFolder('macros')">
                    <img src="https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg" alt="[imagen de macros]">
                    <div class="label">macros</div>
                </div>
                <div class="photo-item" onclick="openFolder('paisajes')">
                    <img src="https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg" alt="[imagen de paisajes]">
                    <div class="label">paisajes</div>
                </div>
            </div>
        </section>

        <section id="folder-view">
            <div class="back-btn" onclick="showHome()">← volver al inicio</div>
            <div id="grid-container" class="grid-container"></div>
        </section>
    </main>

    <footer class="footer">
        <span class="footer-main">© 2026 rodante · todos los derechos reservados</span>
        <span class="footer-sub">creación y diseño por <a href="https://rodante.es" target="_blank">rodante</a></span>
    </footer>

    <div id="viewer">
        <div class="viewer-controls">
            <div class="viewer-btn" onclick="showHome()">inicio</div>
            <div class="viewer-btn" onclick="closeViewer()">cerrar</div>
        </div>
        <div class="nav-btn prev-btn" onclick="changePhoto(-1)">‹</div>
        <div class="nav-btn next-btn" onclick="changePhoto(1)">›</div>
        <img id="viewer-img" src="" alt="">
        <div class="counter text-center"><span id="current-idx">1</span> / <span id="total-idx">1</span></div>
    </div>

    <script>
        const GALLERIES = {
            retratos: [
                "https://live.staticflickr.com/65535/55142314427_0eea5b7fc4_b.jpg",
                "https://live.staticflickr.com/65535/55143210951_f624e6131a_b.jpg",
                "https://live.staticflickr.com/3004/2451484681_99203ea098_b.jpg",
                "https://live.staticflickr.com/65535/52838568502_2a9be494af_b.jpg",
                "https://live.staticflickr.com/65535/52858631615_0d891f59af_b.jpg",
                "https://live.staticflickr.com/4089/4974819976_fe6ebed28d_b.jpg",
                "https://live.staticflickr.com/3041/2470906563_807780a89a_b.jpg",
                "https://live.staticflickr.com/2569/4039397686_9e42450769_b.jpg",
                "https://live.staticflickr.com/65535/52890559297_7c0f74b02a_b.jpg",
                "https://live.staticflickr.com/8653/16628204166_df9204e300_b.jpg",
                "https://live.staticflickr.com/3075/2674106756_5bcd6bcf72_b.jpg",
                "https://live.staticflickr.com/2648/4092163383_55962ba163_b.jpg",
                "https://live.staticflickr.com/2940/14173943340_9efd53125e_b.jpg"
            ],
            macros: [
                "https://live.staticflickr.com/3212/2826709075_d52e578602_b.jpg",
                "https://live.staticflickr.com/2382/2420606177_066aca122c_b.jpg",
                "https://live.staticflickr.com/3193/2434531398_d07439347f_b.jpg",
                "https://live.staticflickr.com/3121/2464264720_9ef862878f_b.jpg",
                "https://live.staticflickr.com/3387/3314202010_0a47624a5e_b.jpg"
            ],
            paisajes: [
                "https://live.staticflickr.com/65535/52771281467_92e7f39e67_b.jpg"
            ]
        };

        let currentActiveGallery = [];
        let currentIndex = 0;

        function showHome() {
            document.getElementById('home-page').style.display = 'flex';
            document.getElementById('folder-view').style.display = 'none';
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
            window.scrollTo(0,0);
        }

        function openFolder(id) {
            currentActiveGallery = GALLERIES[id];
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            currentActiveGallery.forEach((url, idx) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.onclick = () => openViewer(idx);
                item.innerHTML = `<img src="${url}" loading="lazy">`;
                container.appendChild(item);
            });
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function openViewer(index) {
            currentIndex = index;
            updateViewerImage();
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            if (document.getElementById('folder-view').style.display === 'block') document.body.style.overflow = 'auto';
        }

        function updateViewerImage() {
            const img = document.getElementById('viewer-img');
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = currentActiveGallery[currentIndex];
                document.getElementById('current-idx').innerText = currentIndex + 1;
                document.getElementById('total-idx').innerText = currentActiveGallery.length;
                img.onload = () => img.style.opacity = '1';
            }, 100);
        }

        function changePhoto(step) {
            currentIndex = (currentIndex + step + currentActiveGallery.length) % currentActiveGallery.length;
            updateViewerImage();
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('viewer').style.display === 'flex') {
                if (e.key === "Escape") closeViewer();
                if (e.key === "ArrowRight") changePhoto(1);
                if (e.key === "ArrowLeft") changePhoto(-1);
            }
        });
    </script>
</body>
</html>
